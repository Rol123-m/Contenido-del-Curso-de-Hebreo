<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Juego: El Portal del Artículo | Hebreo Bíblico</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+Hebrew:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      font-family: 'Inter', sans-serif;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 20% 40%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .game-container {
      max-width: 1300px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .game-header {
      text-align: center;
      padding: 40px 20px 30px;
      margin-bottom: 30px;
    }

    .game-header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #c084fc 0%, #60a5fa 50%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
      letter-spacing: -0.02em;
    }

    .game-header p {
      color: #94a3b8;
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 80px;
      padding: 12px 24px;
      margin-bottom: 40px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }

    .score-card, .question-counter {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.4);
      padding: 8px 20px;
      border-radius: 40px;
    }

    .score-card i, .question-counter i { font-size: 1.3rem; color: #fbbf24; }
    .score-card span, .question-counter span { font-size: 1.5rem; font-weight: 700; color: white; }
    .score-card p, .question-counter p { color: #94a3b8; font-weight: 500; }

    .reset-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reset-btn:hover { transform: scale(1.05); }

    .question-card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 40px 30px;
      text-align: center;
      margin-bottom: 40px;
      border: 1px solid rgba(139, 92, 246, 0.4);
    }

    .hebrew-word {
      font-family: 'Noto Serif Hebrew', 'Times New Roman', serif;
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 600;
      color: #f1f5f9;
      text-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
      margin: 20px 0;
      direction: rtl;
    }

    .question-label {
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .meaning { color: #94a3b8; font-size: 1.2rem; margin-top: 15px; }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: rgba(15, 23, 42, 0.7);
      border: 2px solid rgba(139, 92, 246, 0.3);
      border-radius: 24px;
      padding: 24px 20px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: 'Noto Serif Hebrew', monospace;
    }

    .option-btn i { font-size: 1.3rem; color: #818cf8; }

    .option-btn:hover:not(:disabled) {
      border-color: #a78bfa;
      background: rgba(139, 92, 246, 0.2);
      transform: translateY(-4px);
    }

    .option-btn.correct-highlight {
      background: linear-gradient(135deg, #10b981, #059669);
      border-color: #34d399;
      color: white;
    }

    .option-btn.wrong-highlight {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-color: #f87171;
      color: white;
    }

    .option-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .feedback {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 18px 24px;
      margin-top: 20px;
      text-align: center;
      font-weight: 500;
      border-left: 5px solid;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feedback.correct { background: rgba(16, 185, 129, 0.15); border-left-color: #10b981; color: #a7f3d0; }
    .feedback.incorrect { background: rgba(239, 68, 68, 0.15); border-left-color: #ef4444; color: #fecaca; }

    .next-btn {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border: none;
      padding: 16px 40px;
      border-radius: 60px;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px auto 0;
      width: fit-content;
    }

    .next-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .progress-container { margin-top: 30px; }
    .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #c084fc, #60a5fa); border-radius: 10px; transition: width 0.3s ease; width: 0%; }

    .result-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .result-modal.show { opacity: 1; visibility: visible; }

    .modal-content {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 40px;
      border-radius: 48px;
      text-align: center;
      max-width: 450px;
      width: 90%;
      border: 1px solid #8b5cf6;
    }

    .modal-content h2 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-content button {
      background: #8b5cf6;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin: 10px;
    }

    @media (max-width: 600px) {
      .stats-bar { border-radius: 24px; flex-direction: column; align-items: stretch; }
      .option-btn { padding: 18px; font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="game-header">
    <h1><i class="fas fa-crown"></i> El Portal del Artículo</h1>
    <p>Convierte palabras indefinidas en definidas. <i class="fas fa-magic"></i> ¡Elige la forma correcta!</p>
  </div>

  <div class="stats-bar">
    <div class="score-card"><i class="fas fa-star"></i><span id="score">0</span><p>/ <span id="totalQuestions">10</span></p></div>
    <div class="question-counter"><i class="fas fa-question-circle"></i><span id="currentQ">1</span><p>/ <span id="totalQDisplay">10</span></p></div>
    <button class="reset-btn" id="resetGame"><i class="fas fa-undo-alt"></i> Reiniciar</button>
  </div>

  <div class="question-card">
    <div class="question-label"><i class="fas fa-hashtag"></i> PALABRA INDEFINIDA</div>
    <div class="hebrew-word" id="hebrewWord">מֶ֫לֶךְ</div>
    <div class="meaning" id="meaning">(rey / un rey)</div>
  </div>

  <div class="options-grid" id="optionsGrid"></div>
  <div id="feedback" class="feedback" style="display: none;"></div>
  <button id="nextBtn" class="next-btn" disabled><i class="fas fa-arrow-right"></i> Siguiente Palabra</button>
  <div class="progress-container"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
</div>

<div id="resultModal" class="result-modal">
  <div class="modal-content">
    <h2><i class="fas fa-trophy"></i> ¡Completado!</h2>
    <p>Tu puntuación: <strong id="finalScore">0</strong> / <span id="finalTotal">10</span></p>
    <button id="playAgainBtn"><i class="fas fa-play"></i> Jugar de nuevo</button>
  </div>
</div>

<script>
  // Cada pregunta incluye la palabra base y su forma definida correcta
  const baseQuestions = [
    { indefinida: "מֶ֫לֶךְ", definida: "הַמֶּ֫לֶךְ", significado: "rey / un rey", explicacion: "Artículo הַ + Daguesh Forte en la מ" },
    { indefinida: "נָבִיא", definida: "הַנָּבִיא", significado: "profeta / un profeta", explicacion: "Artículo הַ + Daguesh Forte (נ con Daguesh)" },
    { indefinida: "אִישׁ", definida: "הָאִישׁ", significado: "hombre / un hombre", explicacion: "Gutural א: Alargamiento compensatorio → הָ" },
    { indefinida: "עִיר", definida: "הָעִיר", significado: "ciudad / una ciudad", explicacion: "Gutural ע: Alargamiento compensatorio → הָ" },
    { indefinida: "חוֹמָה", definida: "הַחוֹמָה", significado: "muralla / una muralla", explicacion: "Gutural ח: Duplicación virtual, Pathaj permanece" },
    { indefinida: "בַּ֫יִת", definida: "הַבַּ֫יִת", significado: "casa / una casa", explicacion: "Begadkefat: Daguesh Lene → Daguesh Forte" },
    { indefinida: "דֶּ֫רֶךְ", definida: "הַדֶּ֫רֶךְ", significado: "camino / un camino", explicacion: "Begadkefat: Daguesh Lene → Daguesh Forte" },
    { indefinida: "רֹאשׁ", definida: "הָרֹאשׁ", significado: "cabeza / una cabeza", explicacion: "Gutural ר: Alargamiento compensatorio → הָ" },
    { indefinida: "חָכָם", definida: "הֶחָכָם", significado: "sabio / un sabio", explicacion: "Vocal Seghol irregular: הֶ por חָ átona" },
    { indefinida: "יְלָדִים", definida: "הַיְלָדִים", significado: "muchachos / unos muchachos", explicacion: "יְ inicial: Pierde Daguesh, Pathaj no se alarga" }
  ];

  // Función para generar opciones incorrectas ENG AÑOSAS basadas en la palabra correcta
  function generateTrickyOptions(correctForm, currentQuestion) {
    const incorrectOptions = new Set();
    
    // 1. Artículo con vocal incorrecta (הֶ en lugar de הַ)
    if (correctForm.startsWith('הַ')) {
      incorrectOptions.add('הֶ' + correctForm.substring(2));
    }
    if (correctForm.startsWith('הָ')) {
      incorrectOptions.add('הַ' + correctForm.substring(2));
      incorrectOptions.add('הֶ' + correctForm.substring(2));
    }
    if (correctForm.startsWith('הֶ')) {
      incorrectOptions.add('הַ' + correctForm.substring(2));
    }
    
    // 2. Sin Daguesh Forte donde debería haberlo
    if (correctForm.includes('ּ')) {
      let sinDaguesh = correctForm.replace(/ּ/g, '');
      if (sinDaguesh !== correctForm) incorrectOptions.add(sinDaguesh);
    }
    
    // 3. Con Daguesh donde NO debería haberlo (para palabras con gutural)
    if (correctForm.match(/[אהחער]/)) {
      let conDaguesh = correctForm.replace(/([אהחער])/, '$1ּ');
      if (conDaguesh !== correctForm) incorrectOptions.add(conDaguesh);
    }
    
    // 4. Artículo separado (error común)
    incorrectOptions.add('הַ ' + correctForm.substring(2));
    
    // 5. Para guturales, probar la otra variante
    if (correctForm.startsWith('הָא')) {
      incorrectOptions.add('הַא' + correctForm.substring(3));
    }
    if (correctForm.startsWith('הָע')) {
      incorrectOptions.add('הַע' + correctForm.substring(3));
    }
    if (correctForm.startsWith('הָר')) {
      incorrectOptions.add('הַר' + correctForm.substring(3));
    }
    
    // Limpiar y tomar solo 3 opciones únicas
    let opts = Array.from(incorrectOptions).filter(opt => opt !== correctForm && opt.length > 0);
    opts = opts.slice(0, 3);
    
    // Si no hay suficientes, agregar variaciones genéricas
    while (opts.length < 3) {
      opts.push('הַ' + currentQuestion.indefinida);
    }
    
    return opts;
  }

  let questions = [];
  let currentIndex = 0;
  let score = 0;
  let answered = false;
  let totalQ = 10;

  // Mezclar preguntas al inicio
  function shuffleQuestions() {
    questions = [...baseQuestions];
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    totalQ = questions.length;
    document.getElementById('totalQuestions').textContent = totalQ;
    document.getElementById('totalQDisplay').textContent = totalQ;
    document.getElementById('finalTotal').textContent = totalQ;
  }

  function generateFullOptions(correctForm, currentQ) {
    const tricky = generateTrickyOptions(correctForm, currentQ);
    let options = [correctForm, ...tricky];
    // Mezclar
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    return options;
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    document.getElementById('hebrewWord').textContent = q.indefinida;
    document.getElementById('meaning').textContent = `(${q.significado})`;
    
    const correct = q.definida;
    const options = generateFullOptions(correct, q);
    
    const container = document.getElementById('optionsGrid');
    container.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<i class="fas fa-scroll"></i> ${opt}`;
      btn.addEventListener('click', () => handleAnswer(opt, correct, q.explicacion));
      container.appendChild(btn);
    });
    
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('nextBtn').disabled = true;
    answered = false;
    
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.classList.remove('correct-highlight', 'wrong-highlight');
      btn.disabled = false;
    });
  }

  function handleAnswer(selected, correct, explicacion) {
    if (answered) return;
    answered = true;
    
    const isCorrect = (selected === correct);
    if (isCorrect) {
      score++;
      document.getElementById('score').textContent = score;
    }
    
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(btn => {
      btn.disabled = true;
      if (btn.innerText.includes(correct)) {
        btn.classList.add('correct-highlight');
      } else if (btn.innerText.includes(selected) && !isCorrect) {
        btn.classList.add('wrong-highlight');
      }
    });
    
    const feedbackDiv = document.getElementById('feedback');
    feedbackDiv.style.display = 'block';
    if (isCorrect) {
      feedbackDiv.className = 'feedback correct';
      feedbackDiv.innerHTML = `<i class="fas fa-check-circle"></i> ¡Correcto! La forma definida es <strong>${correct}</strong>. ${explicacion}`;
    } else {
      feedbackDiv.className = 'feedback incorrect';
      feedbackDiv.innerHTML = `<i class="fas fa-times-circle"></i> Incorrecto. La forma correcta es <strong>${correct}</strong>. ${explicacion}<br>📌 Tu respuesta: ${selected}`;
    }
    
    document.getElementById('nextBtn').disabled = false;
    updateProgress();
  }

  function updateProgress() {
    const percent = ((currentIndex + 1) / totalQ) * 100;
    document.getElementById('progressFill').style.width = `${percent}%`;
    document.getElementById('currentQ').textContent = currentIndex + 1;
  }

  function nextQuestion() {
    if (!answered) return;
    if (currentIndex + 1 < totalQ) {
      currentIndex++;
      renderQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('finalScore').textContent = score;
    document.getElementById('resultModal').classList.add('show');
  }

  function resetGame() {
    shuffleQuestions();
    currentIndex = 0;
    score = 0;
    answered = false;
    document.getElementById('score').textContent = "0";
    renderQuestion();
    updateProgress();
    document.getElementById('resultModal').classList.remove('show');
  }

  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
  document.getElementById('resetGame').addEventListener('click', resetGame);
  document.getElementById('playAgainBtn').addEventListener('click', resetGame);

  // Inicializar
  shuffleQuestions();
  renderQuestion();
  updateProgress();
</script>
</body>
</html>
