<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>El Desafío de los Pronombres | Hebreo Bíblico - Semana 8</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .game-container {
      max-width: 600px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 20px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .game-header {
      background: rgba(0,0,0,0.5);
      border-radius: 40px;
      padding: 15px 20px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stat {
      background: linear-gradient(135deg, #0f3460, #1a1a2e);
      padding: 8px 18px;
      border-radius: 30px;
      color: #e94560;
      font-weight: bold;
      font-size: 1rem;
    }

    .stat span {
      color: #ffd966;
      font-size: 1.3rem;
      margin-right: 5px;
    }

    .question-area {
      background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
      border-radius: 40px;
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 25px;
    }

    .category {
      display: inline-block;
      background: #e94560;
      color: white;
      padding: 5px 15px;
      border-radius: 30px;
      font-size: 0.8rem;
      margin-bottom: 15px;
    }

    .hebrew-word {
      font-size: 3rem;
      font-family: 'Times New Roman', 'Arial Hebrew', serif;
      direction: rtl;
      background: #1a1a2e;
      display: inline-block;
      padding: 15px 30px;
      border-radius: 60px;
      color: #ffd966;
      margin: 15px 0;
      letter-spacing: 3px;
    }

    .hint {
      font-size: 0.85rem;
      color: #666;
      background: #ddd;
      display: inline-block;
      padding: 5px 15px;
      border-radius: 30px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .option-btn {
      background: #0f3460;
      border: none;
      padding: 14px 8px;
      border-radius: 60px;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .option-btn:active {
      transform: scale(0.97);
    }

    .option-btn.correct {
      background: #2ecc71;
      box-shadow: 0 0 15px #2ecc71;
    }

    .option-btn.wrong {
      background: #e74c3c;
      text-decoration: line-through;
    }

    .option-btn.disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    .feedback {
      background: rgba(0,0,0,0.7);
      border-radius: 30px;
      padding: 12px 18px;
      margin: 15px 0;
      text-align: center;
      color: #ffd966;
      font-weight: 500;
    }

    .next-btn {
      width: 100%;
      background: linear-gradient(95deg, #e94560, #c72a48);
      border: none;
      padding: 15px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1.1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .next-btn:active {
      transform: scale(0.98);
    }

    .next-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    @keyframes float {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    .floating {
      position: fixed;
      pointer-events: none;
      font-size: 2rem;
      animation: float 0.8s ease-out forwards;
      z-index: 1000;
    }

    @media (max-width: 480px) {
      .hebrew-word { font-size: 2rem; padding: 10px 20px; }
      .option-btn { font-size: 0.8rem; padding: 10px 6px; }
      .game-container { padding: 15px; }
    }
  </style>
</head>
<body>
<div class="game-container" id="gameApp">
  <div class="game-header">
    <div class="stat"><span>🏆</span> <span id="scoreValue">0</span></div>
    <div class="stat"><span>🔥</span> <span id="streakValue">0</span></div>
    <div class="stat"><span>⚡</span> Nivel <span id="levelValue">1</span></div>
  </div>

  <div class="question-area">
    <div class="category" id="categoryLabel">Pronombre Personal</div>
    <div class="hebrew-word" id="hebrewWord">אֲנִי</div>
    <div class="hint" id="hintText">Selecciona la respuesta correcta</div>
  </div>

  <div class="options-grid" id="optionsContainer"></div>
  <div class="feedback" id="feedbackMsg">💡 ¡Responde correctamente para ganar puntos!</div>
  <button class="next-btn" id="nextBtn">➡ SIGUIENTE PREGUNTA</button>
</div>

<script>
  // Banco de preguntas - Semana 8: Pronombres
  const QUESTIONS = [
    { hebrew: "אֲנִי", correct: "yo", options: ["yo", "tú", "él", "nosotros"], hint: "1ª persona singular", category: "Pronombre Personal" },
    { hebrew: "אַתָּה", correct: "tú (masc.)", options: ["tú (masc.)", "tú (fem.)", "él", "ella"], hint: "2ª persona masculino singular", category: "Pronombre Personal" },
    { hebrew: "אַתְּ", correct: "tú (fem.)", options: ["tú (masc.)", "tú (fem.)", "vosotros", "ellas"], hint: "2ª persona femenino singular", category: "Pronombre Personal" },
    { hebrew: "הוּא", correct: "él", options: ["él", "ella", "ellos", "nosotros"], hint: "3ª persona masculino singular", category: "Pronombre Personal" },
    { hebrew: "הִיא", correct: "ella", options: ["él", "ella", "ellos", "vosotras"], hint: "3ª persona femenino singular", category: "Pronombre Personal" },
    { hebrew: "אֲנַ֫חְנוּ", correct: "nosotros", options: ["nosotros", "vosotros", "ellos", "ellas"], hint: "1ª persona plural", category: "Pronombre Personal" },
    { hebrew: "אַתֶּם", correct: "vosotros (masc.)", options: ["vosotros (masc.)", "vosotras (fem.)", "nosotros", "ellos"], hint: "2ª persona masculino plural", category: "Pronombre Personal" },
    { hebrew: "הֵם", correct: "ellos", options: ["ellos", "ellas", "nosotros", "vosotros"], hint: "3ª persona masculino plural", category: "Pronombre Personal" },
    { hebrew: "זֶה", correct: "este (masc.)", options: ["este (masc.)", "esta (fem.)", "estos", "aquel"], hint: "demostrativo cercano masculino", category: "Demostrativo" },
    { hebrew: "זֹאת", correct: "esta (fem.)", options: ["este (masc.)", "esta (fem.)", "estos", "aquella"], hint: "demostrativo cercano femenino", category: "Demostrativo" },
    { hebrew: "אֵ֫לֶּה", correct: "estos/estas", options: ["este", "esta", "estos/estas", "aquel"], hint: "demostrativo plural común", category: "Demostrativo" },
    { hebrew: "אֲשֶׁר", correct: "que, quien", options: ["que, quien", "por qué", "cómo", "dónde"], hint: "pronombre relativo", category: "Relativo" },
    { hebrew: "מִי", correct: "¿quién?", options: ["¿quién?", "¿qué?", "¿dónde?", "¿cómo?"], hint: "pronombre interrogativo para personas", category: "Interrogativo" },
    { hebrew: "מָה", correct: "¿qué?", options: ["¿quién?", "¿qué?", "¿dónde?", "¿por qué?"], hint: "pronombre interrogativo para cosas", category: "Interrogativo" },
    { hebrew: "הָאִישׁ הַזֶּה", correct: "este hombre", options: ["este hombre", "el hombre es este", "aquel hombre", "hombre este"], hint: "adjetivo demostrativo", category: "Demostrativo" },
    { hebrew: "זֶה הָאִישׁ", correct: "este es el hombre", options: ["este hombre", "este es el hombre", "el hombre este", "aquel hombre"], hint: "pronombre demostrativo", category: "Demostrativo" },
    { hebrew: "לָמָּה", correct: "¿por qué?", options: ["¿qué?", "¿quién?", "¿por qué?", "¿cómo?"], hint: "interrogativo de causa", category: "Interrogativo" },
    { hebrew: "אֵיךְ", correct: "¿cómo?", options: ["¿qué?", "¿quién?", "¿dónde?", "¿cómo?"], hint: "interrogativo de modo", category: "Interrogativo" },
    { hebrew: "הֲשָׁמַרְתָּ", correct: "¿guardaste?", options: ["guardaste", "¿guardaste?", "él guardó", "guardaré"], hint: "con partícula interrogativa prefijada", category: "Interrogativo" }
  ];

  let currentQuestions = [];
  let currentIndex = 0;
  let score = 0;
  let streak = 0;
  let level = 1;
  let canAnswer = true;
  let waitingNext = false;
  let currentQuestion = null;

  const hebrewSpan = document.getElementById('hebrewWord');
  const categorySpan = document.getElementById('categoryLabel');
  const hintSpan = document.getElementById('hintText');
  const optionsDiv = document.getElementById('optionsContainer');
  const feedbackDiv = document.getElementById('feedbackMsg');
  const nextBtn = document.getElementById('nextBtn');
  const scoreSpan = document.getElementById('scoreValue');
  const streakSpan = document.getElementById('streakValue');
  const levelSpan = document.getElementById('levelValue');

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function updateUI() {
    scoreSpan.innerText = score;
    streakSpan.innerText = streak;
    levelSpan.innerText = level;
  }

  function spawnFloating(emoji, element) {
    const rect = element.getBoundingClientRect();
    const div = document.createElement('div');
    div.innerText = emoji;
    div.className = 'floating';
    div.style.left = rect.left + rect.width/2 - 20 + 'px';
    div.style.top = rect.top - 20 + 'px';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 800);
  }

  function loadQuestion() {
    if (currentIndex >= currentQuestions.length) {
      feedbackDiv.innerHTML = "🎉 ¡FELICITACIONES! Completaste la ronda. +50 puntos bonus. ¡Nueva ronda! 🎉";
      score += 50;
      updateUI();
      initGame();
      return;
    }

    canAnswer = true;
    waitingNext = false;
    nextBtn.disabled = false;
    currentQuestion = currentQuestions[currentIndex];
    
    hebrewSpan.innerText = currentQuestion.hebrew;
    categorySpan.innerText = currentQuestion.category;
    hintSpan.innerText = currentQuestion.hint;

    let opts = [...currentQuestion.options];
    if (!opts.includes(currentQuestion.correct)) {
      opts.push(currentQuestion.correct);
    }
    opts = shuffleArray(opts);

    optionsDiv.innerHTML = '';
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.innerText = opt;
      btn.classList.add('option-btn');
      btn.addEventListener('click', (e) => handleAnswer(opt, btn));
      optionsDiv.appendChild(btn);
    });

    feedbackDiv.innerHTML = "🤔 Selecciona una opción...";
  }

  function handleAnswer(selected, btnElement) {
    if (!canAnswer || waitingNext) return;
    
    const isCorrect = (selected === currentQuestion.correct);
    const allBtns = document.querySelectorAll('.option-btn');

    if (isCorrect) {
      let points = 10;
      if (streak >= 2) points += 5;
      if (streak >= 4) points += 5;
      score += points;
      streak++;
      
      if (streak === 5) {
        feedbackDiv.innerHTML = "✨ ¡RACHA ÉPICA! +15 puntos extra ✨";
        score += 15;
        spawnFloating("🔥🔥", btnElement);
      } else {
        feedbackDiv.innerHTML = `✅ ¡Correcto! +${points} puntos. Racha: ${streak}`;
        spawnFloating("✔️", btnElement);
      }
      
      btnElement.classList.add('correct');
      
      if (score >= 100 && level === 1) { level = 2; feedbackDiv.innerHTML += " 🎉 ¡NIVEL 2! 🎉"; }
      else if (score >= 200 && level === 2) { level = 3; feedbackDiv.innerHTML += " 🏆 ¡NIVEL 3 - EXPERTO! 🏆"; }
      
      updateUI();
    } else {
      streak = 0;
      feedbackDiv.innerHTML = `❌ Incorrecto. Respuesta correcta: "${currentQuestion.correct}". ¡Sigue practicando!`;
      btnElement.classList.add('wrong');
      spawnFloating("💔", btnElement);
      updateUI();
      
      allBtns.forEach(btn => {
        if (btn.innerText === currentQuestion.correct) {
          btn.style.border = "3px solid gold";
          btn.style.background = "#2ecc71";
        }
      });
    }

    canAnswer = false;
    waitingNext = true;
    allBtns.forEach(btn => {
      btn.classList.add('disabled');
      btn.style.pointerEvents = 'none';
    });
    nextBtn.disabled = false;
  }

  function nextQuestion() {
    if (!waitingNext && canAnswer) {
      feedbackDiv.innerHTML = "⚠️ ¡Responde la pregunta antes de continuar! ⚠️";
      return;
    }
    currentIndex++;
    loadQuestion();
  }

  function initGame() {
    let shuffled = shuffleArray([...QUESTIONS]);
    currentQuestions = shuffled.slice(0, 15);
    currentIndex = 0;
    score = 0;
    streak = 0;
    level = 1;
    canAnswer = true;
    waitingNext = false;
    updateUI();
    loadQuestion();
  }

  nextBtn.addEventListener('click', nextQuestion);
  initGame();
</script>
</body>
</html>
