<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚔️ GUERRERO DEL ALEFATO · VOCALES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial', sans-serif;
      padding: 10px;
    }

    #gameContainer {
      width: 100%;
      max-width: 500px;
      background: #1a2a3a;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 0 30px #ff000080;
      border: 2px solid #ff4444;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f1f2f;
      padding: 10px;
      border-radius: 15px;
      margin-bottom: 15px;
      color: white;
      border: 1px solid #ffaa00;
    }

    .soldier-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .soldier-avatar {
      width: 40px;
      height: 40px;
      background: #2a4a6a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffaa00;
    }

    .soldier-avatar i {
      color: #ffaa00;
      font-size: 1.2rem;
    }

    .stats {
      display: flex;
      gap: 15px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
    }

    .stat i {
      color: #ffaa00;
    }

    .health-bar {
      width: 60px;
      height: 10px;
      background: #330000;
      border-radius: 5px;
      overflow: hidden;
    }

    .health-fill {
      height: 100%;
      background: #ff0000;
      width: 100%;
      transition: width 0.2s;
    }

    /* Nivel actual */
    .level-info {
      display: flex;
      justify-content: space-between;
      background: #0f1f2f;
      padding: 8px 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      color: #ffaa00;
      border: 1px solid #ffaa00;
      font-weight: bold;
    }

    .level-badge {
      background: #ff4444;
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* Misión */
    .mission {
      background: #0f1f2f;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      color: #ffaa00;
      font-weight: bold;
      border: 2px solid #ffaa00;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Campo de batalla */
    .battlefield {
      background: linear-gradient(180deg, #1a3355, #0a1a2a);
      border-radius: 15px;
      height: 450px;
      position: relative;
      overflow: hidden;
      border: 3px solid #4a7a9c;
      margin-bottom: 15px;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100px;
      background: linear-gradient(180deg, #2d5a3a, #1a3f2a);
      border-top: 3px solid #6a9c5a;
    }

    /* Soldado */
    .soldier {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 45px;
      height: 70px;
      z-index: 10;
      transition: left 0.05s;
      filter: drop-shadow(0 0 10px #ffaa00);
    }

    .soldier-body {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #4a6a4a, #2a4a2a);
      border-radius: 30% 30% 10% 10%;
      border: 3px solid #ffaa00;
      position: relative;
    }

    .soldier-head {
      width: 25px;
      height: 25px;
      background: #d4a76a;
      border-radius: 50%;
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid #ffaa00;
      box-shadow: 0 0 10px #ffaa00;
    }

    .soldier-gun {
      width: 30px;
      height: 8px;
      background: #888;
      position: absolute;
      top: 25px;
      right: -12px;
      transform: rotate(-5deg);
      border-radius: 4px;
      box-shadow: 0 0 5px #ffaa00;
    }

    /* Elementos - MÁS GRANDES */
    .collectible {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 0 black;
      animation: float 1.5s infinite ease-in-out;
      z-index: 5;
      pointer-events: none;
      border: 4px solid yellow;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .collectible.correct {
      background: radial-gradient(circle at 30% 30%, #44ff44, #008800);
      box-shadow: 0 0 30px #00ff00;
    }

    .collectible.incorrect {
      background: radial-gradient(circle at 30% 30%, #ff8888, #880000);
      box-shadow: 0 0 30px #ff0000;
    }

    .enemy {
      position: absolute;
      width: 55px;
      height: 55px;
      background: radial-gradient(circle at 30% 30%, #ff0000, #660000);
      border-radius: 50%;
      border: 4px solid yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 30px #ff0000;
      z-index: 5;
      pointer-events: none;
      animation: enemyPulse 1s infinite;
    }

    @keyframes enemyPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .enemy::before {
      content: "⚔️";
    }

    .bullet {
      position: absolute;
      width: 20px;
      height: 6px;
      background: linear-gradient(90deg, #ffff00, #ffaa00);
      border-radius: 3px;
      box-shadow: 0 0 15px #ffff00;
      z-index: 20;
      pointer-events: none;
    }

    /* Controles MEJORADOS */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .control-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .ctrl-btn {
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #2a4a6a, #1a3a4a);
      border: 4px solid #ffaa00;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffaa00;
      font-size: 2rem;
      cursor: pointer;
      box-shadow: 0 0 20px #ffaa00;
      transition: 0.1s;
      touch-action: manipulation;
    }

    .ctrl-btn:active {
      transform: scale(0.9);
      background: #ffaa00;
      color: #1a2a3a;
    }

    .action-btn {
      width: 100px;
      height: 80px;
      background: linear-gradient(145deg, #ff4444, #aa0000);
      border: 4px solid yellow;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 0 30px #ff0000;
    }

    .action-btn span {
      font-size: 12px;
      margin-top: 5px;
    }

    .action-btn:active {
      transform: scale(0.9);
    }

    .key-hint {
      color: #6a9cff;
      font-size: 12px;
      text-align: center;
      padding: 10px;
      background: #0f1f2f;
      border-radius: 10px;
      margin-top: 5px;
    }

    .key-hint i {
      margin: 0 5px;
      color: #ffaa00;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: linear-gradient(145deg, #1a3f5a, #0f2f4a);
      border: 4px solid #ffaa00;
      border-radius: 30px;
      padding: 40px;
      text-align: center;
      color: white;
      max-width: 350px;
      width: 90%;
    }

    .modal-content i {
      font-size: 5rem;
      color: #ffaa00;
      margin-bottom: 20px;
    }

    .modal-content h2 {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .modal-content p {
      font-size: 1.3rem;
      margin: 10px 0;
    }

    .modal-btn {
      background: linear-gradient(135deg, #ffaa00, #ff6600);
      border: none;
      padding: 15px 40px;
      border-radius: 40px;
      font-size: 1.3rem;
      font-weight: bold;
      margin-top: 25px;
      cursor: pointer;
      width: 100%;
      border: 2px solid white;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <!-- Header -->
    <div class="header">
      <div class="soldier-info">
        <div class="soldier-avatar">
          <i class="fas fa-skull"></i>
        </div>
        <div>
          <div style="font-size: 12px; color: #ffaa00;">SARGENTO ALEF</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <i class="fas fa-star"></i>
          <span id="score">0</span>
        </div>
        <div class="stat">
          <i class="fas fa-heart"></i>
          <div class="health-bar">
            <div class="health-fill" id="health" style="width: 100%;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Nivel actual -->
    <div class="level-info">
      <span>NIVEL <span id="currentLevel">1</span>/<span id="totalLevels">7</span></span>
      <span class="level-badge" id="vowelType">LARGA</span>
    </div>

    <!-- Misión actual -->
    <div class="mission" id="mission">
      🎯 RECOLECTA: QAMETS (A LARGA)
    </div>

    <!-- Campo de batalla -->
    <div class="battlefield" id="battlefield">
      <div class="ground"></div>
      <div class="soldier" id="soldier">
        <div class="soldier-head"></div>
        <div class="soldier-body"></div>
        <div class="soldier-gun"></div>
      </div>
    </div>

    <!-- Controles MEJORADOS -->
    <div class="controls">
      <div class="control-row">
        <div class="ctrl-btn" id="moveLeft" ontouchstart="setMoveLeft(true)" ontouchend="setMoveLeft(false)" ontouchcancel="setMoveLeft(false)" onmousedown="setMoveLeft(true)" onmouseup="setMoveLeft(false)" onmouseleave="setMoveLeft(false)">
          <i class="fas fa-arrow-left"></i>
          <span style="font-size: 10px;">IZQUIERDA</span>
        </div>
        <div class="ctrl-btn" id="moveRight" ontouchstart="setMoveRight(true)" ontouchend="setMoveRight(false)" ontouchcancel="setMoveRight(false)" onmousedown="setMoveRight(true)" onmouseup="setMoveRight(false)" onmouseleave="setMoveRight(false)">
          <i class="fas fa-arrow-right"></i>
          <span style="font-size: 10px;">DERECHA</span>
        </div>
      </div>
      <div class="control-row">
        <div class="action-btn" id="jumpBtn" ontouchstart="doJump()" onmousedown="doJump()">
          <i class="fas fa-arrow-up"></i>
          <span>SALTAR (↑)</span>
        </div>
        <div class="action-btn" id="shootBtn" ontouchstart="doShoot()" onmousedown="doShoot()">
          <i class="fas fa-crosshairs"></i>
          <span>DISPARAR (ESPACIO)</span>
        </div>
      </div>
    </div>
    <div class="key-hint">
      <i class="fas fa-keyboard"></i> FLECHAS: MOVER | ↑: SALTAR | ESPACIO: DISPARAR
    </div>
  </div>

  <!-- Modales -->
  <div class="modal" id="gameOverModal">
    <div class="modal-content">
      <i class="fas fa-skull-crossbones"></i>
      <h2>¡CAÍDO!</h2>
      <p>Puntuación: <span id="finalScore">0</span></p>
      <p>Nivel: <span id="finalLevel">1</span></p>
      <button class="modal-btn" onclick="location.reload()">REINTENTAR</button>
    </div>
  </div>

  <div class="modal" id="victoryModal">
    <div class="modal-content">
      <i class="fas fa-crown"></i>
      <h2>¡VICTORIA!</h2>
      <p>¡Misiones completadas!</p>
      <p>Puntuación: <span id="victoryScore">0</span></p>
      <button class="modal-btn" onclick="location.reload()">JUGAR DE NUEVO</button>
    </div>
  </div>

  <script>
    // ========== VOCALES COMPLETAS ==========
    const vowels = [
      // Largas (10 pts)
      { symbol: 'בָּ', name: 'QAMETS', type: 'larga', class: 'a', value: 10, display: 'A LARGA' },
      { symbol: 'בֵּ', name: 'TSERE', type: 'larga', class: 'e', value: 10, display: 'E LARGA' },
      { symbol: 'בֹּ', name: 'HOLEM', type: 'larga', class: 'o', value: 10, display: 'O LARGA' },
      // Breves (20 pts)
      { symbol: 'בַּ', name: 'PATHACH', type: 'breve', class: 'a', value: 20, display: 'A BREVE' },
      { symbol: 'בֶּ', name: 'SEGHOL', type: 'breve', class: 'e', value: 20, display: 'E BREVE' },
      { symbol: 'בִּ', name: 'HIREQ', type: 'breve', class: 'i', value: 20, display: 'I BREVE' },
      { symbol: 'בֻּ', name: 'QIBBUTS', type: 'breve', class: 'u', value: 20, display: 'U BREVE' }
    ];

    // ========== MISIONES (UNA POR NIVEL) ==========
    const missions = [
      { type: 'larga', class: 'a', display: 'QAMETS (A LARGA)', vowelType: 'LARGA' },
      { type: 'larga', class: 'e', display: 'TSERE (E LARGA)', vowelType: 'LARGA' },
      { type: 'larga', class: 'o', display: 'HOLEM (O LARGA)', vowelType: 'LARGA' },
      { type: 'breve', class: 'a', display: 'PATHACH (A BREVE)', vowelType: 'BREVE' },
      { type: 'breve', class: 'e', display: 'SEGHOL (E BREVE)', vowelType: 'BREVE' },
      { type: 'breve', class: 'i', display: 'HIREQ (I BREVE)', vowelType: 'BREVE' },
      { type: 'breve', class: 'u', display: 'QIBBUTS (U BREVE)', vowelType: 'BREVE' }
    ];

    // ========== ESTADO DEL JUEGO ==========
    let currentLevel = 0; // 0-based
    let currentMission = missions[0];
    let score = 0;
    let health = 100;
    let gameActive = true;
    
    // Posición del soldado
    let soldierPos = 50; // %
    let soldierBottom = 100; // px
    let jumping = false;
    let jumpVelocity = 0;
    const GRAVITY = 0.8;
    const JUMP_FORCE = 15;
    const GROUND_Y = 100;
    
    // Control de movimiento
    let moveLeft = false;
    let moveRight = false;
    
    // Elementos del DOM
    const battlefield = document.getElementById('battlefield');
    const soldier = document.getElementById('soldier');
    const missionEl = document.getElementById('mission');
    const currentLevelEl = document.getElementById('currentLevel');
    const totalLevelsEl = document.getElementById('totalLevels');
    const vowelTypeEl = document.getElementById('vowelType');
    const scoreEl = document.getElementById('score');
    const healthEl = document.getElementById('health');
    const gameOverModal = document.getElementById('gameOverModal');
    const victoryModal = document.getElementById('victoryModal');
    const finalScore = document.getElementById('finalScore');
    const finalLevel = document.getElementById('finalLevel');
    const victoryScore = document.getElementById('victoryScore');
    
    // Intervalos
    let gameLoop;
    let spawnLoop;

    // ========== FUNCIONES DE CONTROL GLOBALES ==========
    window.setMoveLeft = function(value) {
      if (!gameActive) return;
      moveLeft = value;
    };
    
    window.setMoveRight = function(value) {
      if (!gameActive) return;
      moveRight = value;
    };
    
    window.doJump = function() {
      if (!gameActive || jumping) return;
      jumping = true;
      jumpVelocity = JUMP_FORCE;
    };
    
    window.doShoot = function() {
      if (!gameActive) return;
      shoot();
    };

    // ========== CONTROLES DE TECLADO ==========
    document.addEventListener('keydown', (e) => {
      if (!gameActive) return;
      
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        moveLeft = true;
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        moveRight = true;
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (!jumping) {
          jumping = true;
          jumpVelocity = JUMP_FORCE;
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        shoot();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft') {
        moveLeft = false;
      } else if (e.key === 'ArrowRight') {
        moveRight = false;
      }
    });

    // ========== DISPARO ==========
    function shoot() {
      if (!gameActive) return;
      
      const bullet = document.createElement('div');
      bullet.className = 'bullet';
      bullet.style.left = (soldierPos + 2) + '%';
      bullet.style.bottom = (soldierBottom + 30) + 'px';
      battlefield.appendChild(bullet);
      
      let bulletX = soldierPos + 2;
      const bulletInterval = setInterval(() => {
        if (!gameActive) {
          clearInterval(bulletInterval);
          bullet.remove();
          return;
        }
        
        bulletX += 2;
        bullet.style.left = bulletX + '%';
        
        // Detectar colisiones con enemigos
        document.querySelectorAll('.enemy').forEach(enemy => {
          const enemyLeft = parseFloat(enemy.style.left);
          if (Math.abs(enemyLeft - bulletX) < 4) {
            enemy.remove();
            score += 5;
            scoreEl.textContent = score;
          }
        });
        
        if (bulletX > 100) {
          clearInterval(bulletInterval);
          bullet.remove();
        }
      }, 20);
    }

    // ========== ACTUALIZAR SOLDADO ==========
    function updateSoldier() {
      if (!gameActive) return;
      
      // Movimiento horizontal
      if (moveLeft && soldierPos > 5) {
        soldierPos -= 2;
      }
      if (moveRight && soldierPos < 85) {
        soldierPos += 2;
      }
      
      // Física del salto (MEJORADA)
      if (jumping) {
        soldierBottom += jumpVelocity;
        jumpVelocity -= GRAVITY;
        
        // Detectar caída
        if (soldierBottom <= GROUND_Y) {
          soldierBottom = GROUND_Y;
          jumping = false;
          jumpVelocity = 0;
        }
      }
      
      soldier.style.left = soldierPos + '%';
      soldier.style.bottom = soldierBottom + 'px';
    }

    // ========== GENERAR ELEMENTOS ==========
    function spawnItem() {
      if (!gameActive) return;
      
      const rand = Math.random();
      
      // Obtener vocales correctas para el nivel actual
      const correctVowels = vowels.filter(v => 
        v.type === currentMission.type && v.class === currentMission.class
      );
      
      const otherVowels = vowels.filter(v => 
        !(v.type === currentMission.type && v.class === currentMission.class)
      );
      
      if (rand < 0.45) {
        // Vocal correcta (45% probabilidad)
        if (correctVowels.length > 0) {
          const vowel = correctVowels[Math.floor(Math.random() * correctVowels.length)];
          createCollectible(vowel, true);
        }
      } else if (rand < 0.75) {
        // Vocal incorrecta (30% probabilidad)
        if (otherVowels.length > 0) {
          const vowel = otherVowels[Math.floor(Math.random() * otherVowels.length)];
          createCollectible(vowel, false);
        }
      } else {
        // Enemigo (25% probabilidad)
        createEnemy();
      }
    }

    function createCollectible(vowel, isCorrect) {
      const el = document.createElement('div');
      el.className = `collectible ${isCorrect ? 'correct' : 'incorrect'}`;
      el.style.left = '100%';
      el.style.bottom = (GROUND_Y + 20 + Math.random() * 250) + 'px';
      el.innerHTML = vowel.symbol;
      el.dataset.value = vowel.value;
      el.dataset.isCorrect = isCorrect;
      el.dataset.type = vowel.type;
      el.dataset.class = vowel.class;
      battlefield.appendChild(el);
      
      let posX = 100;
      const interval = setInterval(() => {
        if (!gameActive) {
          clearInterval(interval);
          el.remove();
          return;
        }
        
        posX -= 0.7;
        el.style.left = posX + '%';
        
        // Colisión con soldado
        if (Math.abs(posX - soldierPos) < 5 && 
            Math.abs(parseFloat(el.style.bottom) - soldierBottom) < 40) {
          
          if (isCorrect) {
            // ✅ ACIERTO: avanzar nivel
            score += parseInt(el.dataset.value);
            scoreEl.textContent = score;
            advanceToNextLevel();
          } else {
            // ❌ ERROR: pierde vida
            health -= 15;
            updateHealth();
          }
          
          el.remove();
          clearInterval(interval);
        }
        
        if (posX < -10) {
          el.remove();
          clearInterval(interval);
        }
      }, 30);
    }

    function createEnemy() {
      const el = document.createElement('div');
      el.className = 'enemy';
      el.style.left = '100%';
      el.style.bottom = (GROUND_Y + 20 + Math.random() * 200) + 'px';
      battlefield.appendChild(el);
      
      let posX = 100;
      const interval = setInterval(() => {
        if (!gameActive) {
          clearInterval(interval);
          el.remove();
          return;
        }
        
        posX -= 1;
        el.style.left = posX + '%';
        
        if (Math.abs(posX - soldierPos) < 6 && 
            Math.abs(parseFloat(el.style.bottom) - soldierBottom) < 45) {
          health -= 25;
          updateHealth();
          el.remove();
          clearInterval(interval);
        }
        
        if (posX < -10) {
          el.remove();
          clearInterval(interval);
        }
      }, 30);
    }

    // ========== AVANZAR AL SIGUIENTE NIVEL ==========
    function advanceToNextLevel() {
      if (currentLevel < missions.length - 1) {
        // Siguiente nivel
        currentLevel++;
        currentMission = missions[currentLevel];
        
        // Actualizar UI
        missionEl.textContent = `🎯 RECOLECTA: ${currentMission.display}`;
        currentLevelEl.textContent = currentLevel + 1;
        vowelTypeEl.textContent = currentMission.vowelType;
        
        // Feedback visual
        showMessage(`¡NIVEL ${currentLevel + 1}!`, '#44ff44');
      } else {
        // VICTORIA - Todos los niveles completados
        gameActive = false;
        victoryScore.textContent = score;
        victoryModal.style.display = 'flex';
        clearInterval(gameLoop);
        clearInterval(spawnLoop);
      }
    }

    // ========== ACTUALIZAR VIDA ==========
    function updateHealth() {
      health = Math.max(0, health);
      healthEl.style.width = health + '%';
      
      if (health <= 0) {
        gameActive = false;
        finalScore.textContent = score;
        finalLevel.textContent = currentLevel + 1;
        gameOverModal.style.display = 'flex';
        clearInterval(gameLoop);
        clearInterval(spawnLoop);
      }
    }

    // ========== MENSAJE FLOTANTE ==========
    function showMessage(text, color) {
      const msg = document.createElement('div');
      msg.style.position = 'absolute';
      msg.style.left = '50%';
      msg.style.top = '30%';
      msg.style.transform = 'translate(-50%, -50%)';
      msg.style.color = color;
      msg.style.fontSize = '2rem';
      msg.style.fontWeight = 'bold';
      msg.style.textShadow = '2px 2px 0 black';
      msg.style.zIndex = '100';
      msg.style.animation = 'float 1s forwards';
      msg.innerHTML = text;
      battlefield.appendChild(msg);
      
      setTimeout(() => msg.remove(), 1000);
    }

    // ========== INICIAR JUEGO ==========
    function init() {
      totalLevelsEl.textContent = missions.length;
      missionEl.textContent = `🎯 RECOLECTA: ${currentMission.display}`;
      currentLevelEl.textContent = '1';
      vowelTypeEl.textContent = currentMission.vowelType;
      
      gameLoop = setInterval(updateSoldier, 20);
      spawnLoop = setInterval(spawnItem, 1000);
    }

    init();
  </script>
</body>
</html>
