<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚔️ GUERRERO DEL ALEFATO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      padding: 10px;
    }

    #gameContainer {
      width: 100%;
      max-width: 500px;
      background: #1a2a3a;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 0 30px #ff000080;
      border: 2px solid #ff4444;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f1f2f;
      padding: 10px;
      border-radius: 15px;
      margin-bottom: 15px;
      color: white;
      border: 1px solid #ffaa00;
    }

    .soldier-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .soldier-avatar {
      width: 40px;
      height: 40px;
      background: #2a4a6a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffaa00;
    }

    .soldier-avatar i {
      color: #ffaa00;
      font-size: 1.2rem;
    }

    .stats {
      display: flex;
      gap: 15px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
    }

    .stat i {
      color: #ffaa00;
    }

    .health-bar {
      width: 60px;
      height: 10px;
      background: #330000;
      border-radius: 5px;
      overflow: hidden;
    }

    .health-fill {
      height: 100%;
      background: #ff0000;
      width: 100%;
    }

    /* Misión */
    .mission {
      background: #0f1f2f;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      color: #ffaa00;
      font-weight: bold;
      border: 2px solid #ffaa00;
      font-size: 14px;
    }

    /* Campo de batalla */
    .battlefield {
      background: linear-gradient(180deg, #1a3355, #0a1a2a);
      border-radius: 15px;
      height: 400px;
      position: relative;
      overflow: hidden;
      border: 3px solid #4a7a9c;
      margin-bottom: 15px;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100px;
      background: linear-gradient(180deg, #2d5a3a, #1a3f2a);
      border-top: 3px solid #6a9c5a;
    }

    /* Soldado */
    .soldier {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 60px;
      z-index: 10;
      transition: left 0.1s;
    }

    .soldier-body {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #4a6a4a, #2a4a2a);
      border-radius: 30% 30% 10% 10%;
      border: 3px solid #ffaa00;
      position: relative;
    }

    .soldier-head {
      width: 20px;
      height: 20px;
      background: #d4a76a;
      border-radius: 50%;
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid #ffaa00;
    }

    .soldier-gun {
      width: 25px;
      height: 6px;
      background: #888;
      position: absolute;
      top: 20px;
      right: -10px;
      transform: rotate(-10deg);
      border-radius: 3px;
    }

    /* Elementos */
    .collectible, .enemy, .bullet {
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }

    .collectible {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: white;
      animation: float 1s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .collectible.correct {
      background: radial-gradient(circle, #44ff44, #00aa00);
      border: 2px solid yellow;
      box-shadow: 0 0 20px #00ff00;
    }

    .collectible.incorrect {
      background: radial-gradient(circle, #ff4444, #aa0000);
      border: 2px solid yellow;
      box-shadow: 0 0 20px #ff0000;
    }

    .enemy {
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, #ff6666, #660000);
      border-radius: 50%;
      border: 3px solid yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 0 20px #ff0000;
    }

    .enemy::before {
      content: "⚔️";
    }

    .bullet {
      width: 15px;
      height: 4px;
      background: linear-gradient(90deg, yellow, orange);
      border-radius: 2px;
      box-shadow: 0 0 10px yellow;
    }

    /* Controles */
    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 15px;
    }

    .movement {
      display: flex;
      gap: 10px;
      flex: 1;
    }

    .ctrl-btn {
      flex: 1;
      height: 60px;
      background: linear-gradient(145deg, #2a4a6a, #1a3a4a);
      border: 3px solid #ffaa00;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffaa00;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 0 15px #ffaa00;
      transition: 0.1s;
    }

    .ctrl-btn:active {
      transform: scale(0.95);
      background: #ffaa00;
      color: #1a2a3a;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex: 1;
    }

    .action-btn {
      flex: 1;
      height: 60px;
      background: linear-gradient(145deg, #ff4444, #aa0000);
      border: 3px solid yellow;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 0 20px #ff0000;
    }

    .action-btn span {
      font-size: 10px;
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    .key-hint {
      color: #6a9cff;
      font-size: 10px;
      margin-top: 5px;
      text-align: center;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: linear-gradient(145deg, #1a3f5a, #0f2f4a);
      border: 4px solid #ffaa00;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      color: white;
      max-width: 300px;
    }

    .modal-content i {
      font-size: 4rem;
      color: #ffaa00;
      margin-bottom: 15px;
    }

    .modal-btn {
      background: linear-gradient(135deg, #ffaa00, #ff6600);
      border: none;
      padding: 15px 30px;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <!-- Header -->
    <div class="header">
      <div class="soldier-info">
        <div class="soldier-avatar">
          <i class="fas fa-skull"></i>
        </div>
        <div>
          <div style="font-size: 12px; color: #ffaa00;">SARGENTO ALEF</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <i class="fas fa-star"></i>
          <span id="score">0</span>
        </div>
        <div class="stat">
          <i class="fas fa-heart"></i>
          <div class="health-bar">
            <div class="health-fill" id="health" style="width: 100%;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Misión actual -->
    <div class="mission" id="mission">
      Recolecta: Qamets (a larga)
    </div>

    <!-- Campo de batalla -->
    <div class="battlefield" id="battlefield">
      <div class="ground"></div>
      <div class="soldier" id="soldier">
        <div class="soldier-head"></div>
        <div class="soldier-body"></div>
        <div class="soldier-gun"></div>
      </div>
    </div>

    <!-- Controles táctiles y hint de teclado -->
    <div class="controls">
      <div class="movement">
        <div class="ctrl-btn" id="moveLeft" ontouchstart="moveLeftActive = true" ontouchend="moveLeftActive = false" ontouchcancel="moveLeftActive = false" onmousedown="moveLeftActive = true" onmouseup="moveLeftActive = false" onmouseleave="moveLeftActive = false">
          <i class="fas fa-arrow-left"></i>
        </div>
        <div class="ctrl-btn" id="moveRight" ontouchstart="moveRightActive = true" ontouchend="moveRightActive = false" ontouchcancel="moveRightActive = false" onmousedown="moveRightActive = true" onmouseup="moveRightActive = false" onmouseleave="moveRightActive = false">
          <i class="fas fa-arrow-right"></i>
        </div>
      </div>
      <div class="actions">
        <div class="action-btn" id="jumpBtn" ontouchstart="jump()" onmousedown="jump()">
          <i class="fas fa-arrow-up"></i>
          <span>SALTAR</span>
        </div>
        <div class="action-btn" id="shootBtn" ontouchstart="shoot()" onmousedown="shoot()">
          <i class="fas fa-crosshairs"></i>
          <span>DISPARAR</span>
        </div>
      </div>
    </div>
    <div class="key-hint">
      <span>← → MOVER | ↑ SALTAR | ESPACIO DISPARAR</span>
    </div>
  </div>

  <!-- Modales -->
  <div class="modal" id="gameOverModal">
    <div class="modal-content">
      <i class="fas fa-skull-crossbones"></i>
      <h2>¡CAÍDO!</h2>
      <p>Puntos: <span id="finalScore">0</span></p>
      <button class="modal-btn" onclick="location.reload()">REINTENTAR</button>
    </div>
  </div>

  <div class="modal" id="victoryModal">
    <div class="modal-content">
      <i class="fas fa-crown"></i>
      <h2>¡VICTORIA!</h2>
      <p>Puntos: <span id="victoryScore">0</span></p>
      <button class="modal-btn" onclick="location.reload()">JUGAR DE NUEVO</button>
    </div>
  </div>

  <script>
    // Vocales
    const vowels = [
      { symbol: 'בָּ', name: 'Qamets', type: 'larga', class: 'a', value: 10 },
      { symbol: 'בֵּ', name: 'Tsere', type: 'larga', class: 'e', value: 10 },
      { symbol: 'בֹּ', name: 'Holem', type: 'larga', class: 'o', value: 10 },
      { symbol: 'בַּ', name: 'Pathach', type: 'breve', class: 'a', value: 20 },
      { symbol: 'בֶּ', name: 'Seghol', type: 'breve', class: 'e', value: 20 },
      { symbol: 'בִּ', name: 'Hireq', type: 'breve', class: 'i', value: 20 },
      { symbol: 'בֻּ', name: 'Qibbuts', type: 'breve', class: 'u', value: 20 }
    ];

    const missions = [
      { type: 'larga', class: 'a', text: 'Recolecta: Qamets (a larga)' },
      { type: 'larga', class: 'e', text: 'Recolecta: Tsere (e larga)' },
      { type: 'larga', class: 'o', text: 'Recolecta: Holem (o larga)' },
      { type: 'breve', class: 'a', text: 'Recolecta: Pathach (a breve)' },
      { type: 'breve', class: 'e', text: 'Recolecta: Seghol (e breve)' },
      { type: 'breve', class: 'i', text: 'Recolecta: Hireq (i breve)' },
      { type: 'breve', class: 'u', text: 'Recolecta: Qibbuts (u breve)' }
    ];

    // Estado del juego
    let currentMissionIndex = 0;
    let currentMission = missions[0];
    let score = 0;
    let health = 100;
    let gameActive = true;
    let soldierPos = 50; // porcentaje
    let soldierBottom = 100; // px desde abajo
    let jumping = false;
    let jumpVelocity = 0;
    
    // Variables de control
    let moveLeftActive = false;
    let moveRightActive = false;

    // Elementos DOM
    const battlefield = document.getElementById('battlefield');
    const soldier = document.getElementById('soldier');
    const missionEl = document.getElementById('mission');
    const scoreEl = document.getElementById('score');
    const healthEl = document.getElementById('health');
    const gameOverModal = document.getElementById('gameOverModal');
    const victoryModal = document.getElementById('victoryModal');
    const finalScore = document.getElementById('finalScore');
    const victoryScore = document.getElementById('victoryScore');

    // Variables para elementos del juego
    let gameLoop;
    let spawnLoop;

    // Funciones globales para controles
    window.moveLeftActive = false;
    window.moveRightActive = false;

    window.jump = function() {
      if (!gameActive || jumping) return;
      jumping = true;
      jumpVelocity = 12;
    };

    window.shoot = function() {
      if (!gameActive) return;
      
      const bullet = document.createElement('div');
      bullet.className = 'bullet';
      bullet.style.left = (soldierPos + 2) + '%';
      bullet.style.bottom = '120px';
      battlefield.appendChild(bullet);
      
      let bulletX = soldierPos + 2;
      const bulletInterval = setInterval(() => {
        bulletX += 2;
        bullet.style.left = bulletX + '%';
        
        // Detectar colisiones con enemigos
        document.querySelectorAll('.enemy').forEach(enemy => {
          const enemyLeft = parseFloat(enemy.style.left);
          if (Math.abs(enemyLeft - bulletX) < 3) {
            enemy.remove();
            score += 5;
            scoreEl.textContent = score;
          }
        });
        
        if (bulletX > 100) {
          clearInterval(bulletInterval);
          bullet.remove();
        }
      }, 30);
    };

    // Controles de teclado
    document.addEventListener('keydown', (e) => {
      if (!gameActive) return;
      
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        moveLeftActive = true;
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        moveRightActive = true;
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (!jumping) {
          jumping = true;
          jumpVelocity = 12;
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        shoot();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft') {
        moveLeftActive = false;
      } else if (e.key === 'ArrowRight') {
        moveRightActive = false;
      }
    });

    // Actualizar posición del soldado
    function updateSoldier() {
      if (!gameActive) return;
      
      // Movimiento horizontal
      if (moveLeftActive && soldierPos > 5) {
        soldierPos -= 1.5;
      }
      if (moveRightActive && soldierPos < 85) {
        soldierPos += 1.5;
      }
      
      // Física del salto
      if (jumping) {
        soldierBottom += jumpVelocity;
        jumpVelocity -= 1;
        
        if (soldierBottom <= 100) {
          soldierBottom = 100;
          jumping = false;
          jumpVelocity = 0;
        }
      }
      
      soldier.style.left = soldierPos + '%';
      soldier.style.bottom = soldierBottom + 'px';
    }

    // Generar elementos
    function spawnItem() {
      if (!gameActive) return;
      
      const rand = Math.random();
      
      if (rand < 0.4) {
        // Vocal correcta
        const correctVowels = vowels.filter(v => 
          v.type === currentMission.type && v.class === currentMission.class
        );
        if (correctVowels.length > 0) {
          const vowel = correctVowels[Math.floor(Math.random() * correctVowels.length)];
          createCollectible(vowel, true);
        }
      } else if (rand < 0.7) {
        // Vocal incorrecta
        const incorrectVowels = vowels.filter(v => 
          !(v.type === currentMission.type && v.class === currentMission.class)
        );
        if (incorrectVowels.length > 0) {
          const vowel = incorrectVowels[Math.floor(Math.random() * incorrectVowels.length)];
          createCollectible(vowel, false);
        }
      } else {
        // Enemigo
        createEnemy();
      }
    }

    function createCollectible(vowel, isCorrect) {
      const el = document.createElement('div');
      el.className = `collectible ${isCorrect ? 'correct' : 'incorrect'}`;
      el.style.left = '100%';
      el.style.bottom = (120 + Math.random() * 200) + 'px';
      el.innerHTML = vowel.symbol;
      el.dataset.value = vowel.value;
      el.dataset.isCorrect = isCorrect;
      battlefield.appendChild(el);
      
      let posX = 100;
      const interval = setInterval(() => {
        if (!gameActive) {
          clearInterval(interval);
          el.remove();
          return;
        }
        
        posX -= 0.8;
        el.style.left = posX + '%';
        
        // Colisión con soldado
        if (Math.abs(posX - soldierPos) < 4 && 
            Math.abs(parseFloat(el.style.bottom) - soldierBottom) < 30) {
          
          if (isCorrect) {
            score += parseInt(el.dataset.value);
            scoreEl.textContent = score;
            advanceMission();
          } else {
            health -= 10;
            updateHealth();
          }
          
          el.remove();
          clearInterval(interval);
        }
        
        if (posX < -10) {
          el.remove();
          clearInterval(interval);
        }
      }, 30);
    }

    function createEnemy() {
      const el = document.createElement('div');
      el.className = 'enemy';
      el.style.left = '100%';
      el.style.bottom = (120 + Math.random() * 150) + 'px';
      battlefield.appendChild(el);
      
      let posX = 100;
      const interval = setInterval(() => {
        if (!gameActive) {
          clearInterval(interval);
          el.remove();
          return;
        }
        
        posX -= 1;
        el.style.left = posX + '%';
        
        if (Math.abs(posX - soldierPos) < 5 && 
            Math.abs(parseFloat(el.style.bottom) - soldierBottom) < 35) {
          health -= 20;
          updateHealth();
          el.remove();
          clearInterval(interval);
        }
        
        if (posX < -10) {
          el.remove();
          clearInterval(interval);
        }
      }, 30);
    }

    function updateHealth() {
      healthEl.style.width = Math.max(0, health) + '%';
      if (health <= 0) {
        gameActive = false;
        finalScore.textContent = score;
        gameOverModal.style.display = 'flex';
        clearInterval(gameLoop);
        clearInterval(spawnLoop);
      }
    }

    function advanceMission() {
      if (currentMissionIndex < missions.length - 1) {
        currentMissionIndex++;
        currentMission = missions[currentMissionIndex];
        missionEl.textContent = currentMission.text;
      } else {
        // Victoria
        gameActive = false;
        victoryScore.textContent = score;
        victoryModal.style.display = 'flex';
        clearInterval(gameLoop);
        clearInterval(spawnLoop);
      }
    }

    // Iniciar el juego
    function init() {
      missionEl.textContent = currentMission.text;
      gameLoop = setInterval(updateSoldier, 30);
      spawnLoop = setInterval(spawnItem, 1200);
    }

    init();
  </script>
</body>
</html>
