<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚔️ GUERRERO DEL ALEFATO · MÓVIL</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    /* Header estilo militar */
    .combat-header {
      background: linear-gradient(135deg, #1a2a3a, #0f1f2f);
      color: #b8e2ff;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      gap: 8px;
      border-bottom: 3px solid #ff4444;
      box-shadow: 0 0 20px #ff000080;
      z-index: 10;
      font-size: 12px;
    }

    .soldier-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .soldier-avatar {
      width: 35px;
      height: 35px;
      background: #2a4a6a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffaa00;
      box-shadow: 0 0 15px #ffaa00;
    }

    .soldier-avatar i {
      font-size: 1.2rem;
      color: #ffaa00;
    }

    .soldier-name {
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      color: #ffaa00;
    }

    .mission-stats {
      display: flex;
      gap: 12px;
      flex-wrap: nowrap;
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      white-space: nowrap;
    }

    .stat-item i {
      color: #ffaa00;
      font-size: 12px;
    }

    .health-bar {
      width: 60px;
      height: 10px;
      background: #330000;
      border: 1px solid #ff6666;
      border-radius: 5px;
      overflow: hidden;
    }

    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff0000, #ff6666);
      width: 100%;
      transition: width 0.3s;
    }

    /* Contenedor del juego */
    .game-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
      height: calc(100% - 120px);
    }

    /* Campo de batalla */
    .battlefield {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a3355 0%, #0f2640 50%, #081a2f 100%);
      border: 3px solid #4a7a9c;
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px #2a6a9c80, inset 0 0 30px #00000080;
      touch-action: none;
    }

    /* Capas de fondo */
    .sky-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: radial-gradient(circle at 20% 30%, #2a5a8a, #0f2f4a);
      overflow: hidden;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      animation: twinkle 3s infinite;
    }

    .stars::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(2px 2px at 10px 10px, white, transparent),
                  radial-gradient(2px 2px at 30px 50px, white, transparent);
      background-size: 100px 100px;
      opacity: 0.5;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .ground-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(180deg, #2d5a3a, #1a3f2a);
      border-top: 3px solid #6a9c5a;
      overflow: hidden;
    }

    .trenches {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(45deg, #1a3f2a 0px, #1a3f2a 10px, #2d5a3a 10px, #2d5a3a 20px);
      opacity: 0.3;
    }

    /* Soldado */
    .soldier {
      position: absolute;
      bottom: 40%;
      left: 50px;
      width: 45px;
      height: 65px;
      transition: bottom 0.1s, left 0.1s;
      z-index: 20;
      filter: drop-shadow(0 0 8px #ffaa00);
      touch-action: none;
      pointer-events: none;
    }

    .soldier-body {
      position: relative;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #4a6a4a, #2a4a2a);
      border-radius: 30% 30% 10% 10%;
      border: 3px solid #ffaa00;
    }

    .soldier-head {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 22px;
      background: #d4a76a;
      border-radius: 50%;
      border: 3px solid #ffaa00;
      box-shadow: 0 0 8px #ffaa00;
    }

    .soldier-gun {
      position: absolute;
      top: 15px;
      right: -12px;
      width: 25px;
      height: 6px;
      background: #888888;
      border-radius: 3px;
      transform: rotate(-10deg);
      box-shadow: 0 0 5px #ffaa00;
    }

    /* Elementos del juego */
    .collectible {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Times New Roman', serif;
      font-size: 1.2rem;
      color: white;
      text-shadow: 0 0 8px currentColor;
      z-index: 15;
      animation: float 2s infinite ease-in-out;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .collectible.correct {
      background: radial-gradient(circle at 30% 30%, #44ff44, #00aa00);
      box-shadow: 0 0 20px #00ff00;
      border: 2px solid #ffff00;
    }

    .collectible.incorrect {
      background: radial-gradient(circle at 30% 30%, #ff4444, #aa0000);
      box-shadow: 0 0 20px #ff0000;
      border: 2px solid #ffff00;
    }

    .enemy {
      position: absolute;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle at 30% 30%, #ff6666, #660000);
      border-radius: 50%;
      border: 3px solid #ffff00;
      box-shadow: 0 0 20px #ff0000;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      pointer-events: none;
    }

    .enemy::before {
      content: '⚔️';
    }

    /* Panel de control táctil */
    .touch-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 10px;
      background: #1a2a3a;
      border: 2px solid #4a7a9c;
      border-radius: 50px;
      gap: 15px;
    }

    .movement-panel {
      display: flex;
      gap: 20px;
      background: #0f1f2f;
      padding: 10px 20px;
      border-radius: 40px;
    }

    .move-btn {
      width: 60px;
      height: 60px;
      background: linear-gradient(145deg, #2a4a6a, #1a3a4a);
      border: 3px solid #ffaa00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffaa00;
      font-size: 2rem;
      box-shadow: 0 0 20px #ffaa00;
      cursor: pointer;
      touch-action: manipulation;
      transition: 0.1s;
    }

    .move-btn:active {
      transform: scale(0.9);
      background: #ffaa00;
      color: #1a2a3a;
    }

    .action-panel {
      display: flex;
      gap: 15px;
    }

    .action-btn {
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, #ff4444, #aa0000);
      border: 3px solid #ffff00;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      box-shadow: 0 0 30px #ff0000;
      cursor: pointer;
      touch-action: manipulation;
    }

    .action-btn span {
      font-size: 10px;
      margin-top: 2px;
    }

    .action-btn:active {
      transform: scale(0.9);
    }

    .mission-text {
      background: #1a2a3a;
      padding: 8px 15px;
      border-radius: 40px;
      color: #ffaa00;
      font-size: 12px;
      text-align: center;
      border: 2px solid #ffaa00;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Modal */
    .mission-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      place-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-content {
      background: linear-gradient(145deg, #1a3f5a, #0f2f4a);
      border: 4px solid #ffaa00;
      border-radius: 30px;
      padding: 30px 20px;
      text-align: center;
      max-width: 350px;
      width: 100%;
      color: white;
      box-shadow: 0 0 60px #ffaa00;
    }

    .modal-content i {
      font-size: 4rem;
      color: #ffaa00;
      margin-bottom: 15px;
    }

    .modal-content h2 {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.2rem;
      margin-bottom: 15px;
    }

    .modal-btn {
      background: linear-gradient(135deg, #ffaa00, #ff6600);
      border: none;
      padding: 15px 30px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      color: #1a1a2a;
      margin-top: 20px;
      width: 100%;
    }

    /* Disparo */
    .bullet {
      position: absolute;
      width: 15px;
      height: 4px;
      background: linear-gradient(90deg, #ffff00, #ffaa00);
      border-radius: 2px;
      box-shadow: 0 0 8px #ffff00;
      z-index: 25;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header class="combat-header">
    <div class="soldier-info">
      <div class="soldier-avatar">
        <i class="fas fa-skull"></i>
      </div>
      <div>
        <div class="soldier-name">SARGENTO ALEF</div>
      </div>
    </div>
    <div class="mission-stats">
      <div class="stat-item">
        <i class="fas fa-star"></i>
        <span id="scoreValue">0</span>
      </div>
      <div class="stat-item">
        <i class="fas fa-heart"></i>
        <div class="health-bar">
          <div class="health-fill" id="healthFill" style="width: 100%;"></div>
        </div>
      </div>
      <div class="stat-item">
        <i class="fas fa-shield-alt"></i>
        <span id="shieldValue">0</span>
      </div>
    </div>
  </header>

  <div class="game-zone">
    <div class="mission-text" id="objectiveText">
      Recolecta: Qamets (a larga)
    </div>
    
    <div class="battlefield" id="battlefield" ontouchstart="event.preventDefault()">
      <div class="sky-layer">
        <div class="stars"></div>
      </div>
      <div class="ground-layer">
        <div class="trenches"></div>
      </div>
      
      <!-- Soldado -->
      <div class="soldier" id="soldier" style="bottom: 40%; left: 45%;">
        <div class="soldier-head"></div>
        <div class="soldier-body"></div>
        <div class="soldier-gun"></div>
      </div>
    </div>

    <!-- Controles táctiles -->
    <div class="touch-controls">
      <div class="movement-panel">
        <div class="move-btn" id="moveLeft" ontouchstart="handleTouchStart('left')" ontouchend="handleTouchEnd('left')" ontouchcancel="handleTouchEnd('left')">
          <i class="fas fa-arrow-left"></i>
        </div>
        <div class="move-btn" id="moveRight" ontouchstart="handleTouchStart('right')" ontouchend="handleTouchEnd('right')" ontouchcancel="handleTouchEnd('right')">
          <i class="fas fa-arrow-right"></i>
        </div>
      </div>
      <div class="action-panel">
        <div class="action-btn" id="jumpBtn" ontouchstart="handleJump()">
          <i class="fas fa-arrow-up"></i>
          <span>SALTAR</span>
        </div>
        <div class="action-btn" id="shootBtn" ontouchstart="handleShoot()">
          <i class="fas fa-crosshairs"></i>
          <span>DISPARAR</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Modales -->
  <div class="mission-modal" id="gameOverModal">
    <div class="modal-content">
      <i class="fas fa-skull-crossbones"></i>
      <h2>¡CAÍDO EN COMBATE!</h2>
      <p>Puntuación: <span id="finalScore">0</span></p>
      <button class="modal-btn" onclick="window.location.reload()">
        <i class="fas fa-redo-alt"></i> REINTENTAR
      </button>
    </div>
  </div>

  <div class="mission-modal" id="victoryModal">
    <div class="modal-content">
      <i class="fas fa-crown"></i>
      <h2>¡MISIÓN CUMPLIDA!</h2>
      <p>Puntuación: <span id="victoryScore">0</span></p>
      <button class="modal-btn" onclick="window.location.reload()">
        <i class="fas fa-redo-alt"></i> JUGAR DE NUEVO
      </button>
    </div>
  </div>

  <script>
    (function() {
      // Base de datos de vocales
      const vowels = [
        { symbol: 'בָּ', name: 'Qamets', type: 'larga', class: 'a', value: 10 },
        { symbol: 'בֵּ', name: 'Tsere', type: 'larga', class: 'e', value: 10 },
        { symbol: 'בֹּ', name: 'Holem', type: 'larga', class: 'o', value: 10 },
        { symbol: 'בַּ', name: 'Pathach', type: 'breve', class: 'a', value: 20 },
        { symbol: 'בֶּ', name: 'Seghol', type: 'breve', class: 'e', value: 20 },
        { symbol: 'בִּ', name: 'Hireq', type: 'breve', class: 'i', value: 20 },
        { symbol: 'בָּ', name: 'Qamets Hatuf', type: 'breve', class: 'o', value: 20 },
        { symbol: 'בֻּ', name: 'Qibbuts', type: 'breve', class: 'u', value: 20 },
        { symbol: 'בֲּ', name: 'Hateph Pathach', type: 'reducida', class: 'a', value: 30 },
        { symbol: 'בֱּ', name: 'Hateph Seghol', type: 'reducida', class: 'e', value: 30 },
        { symbol: 'בֳּ', name: 'Hateph Qamets', type: 'reducida', class: 'o', value: 30 },
        { symbol: 'בָּה', name: 'Qamets He', type: 'matres', class: 'a', value: 40 },
        { symbol: 'בּוֹ', name: 'Holem Waw', type: 'matres', class: 'o', value: 40 },
        { symbol: 'בּוּ', name: 'Shureq', type: 'matres', class: 'u', value: 40 },
        { symbol: 'בִּי', name: 'Hireq Yod', type: 'matres', class: 'i', value: 40 }
      ];

      // Estado del juego
      let currentTargetIndex = 0;
      let score = 0;
      let health = 100;
      let shield = 0;
      let gameActive = true;
      let soldierPosition = 45; // % desde la izquierda
      let soldierBottom = 40; // % desde abajo
      let jumping = false;
      let jumpHeight = 0;
      let moveLeftActive = false;
      let moveRightActive = false;
      
      const battlefield = document.getElementById('battlefield');
      const soldier = document.getElementById('soldier');
      const objectiveText = document.getElementById('objectiveText');
      const scoreValue = document.getElementById('scoreValue');
      const healthFill = document.getElementById('healthFill');
      const shieldValue = document.getElementById('shieldValue');
      const gameOverModal = document.getElementById('gameOverModal');
      const victoryModal = document.getElementById('victoryModal');
      const finalScore = document.getElementById('finalScore');
      const victoryScore = document.getElementById('victoryScore');

      // Misiones
      const missions = [
        { type: 'larga', class: 'a', description: 'Recolecta: Qamets (a larga)' },
        { type: 'larga', class: 'e', description: 'Recolecta: Tsere (e larga)' },
        { type: 'larga', class: 'o', description: 'Recolecta: Holem (o larga)' },
        { type: 'breve', class: 'a', description: 'Recolecta: Pathach (a breve)' },
        { type: 'breve', class: 'e', description: 'Recolecta: Seghol (e breve)' },
        { type: 'breve', class: 'i', description: 'Recolecta: Hireq (i breve)' },
        { type: 'breve', class: 'o', description: 'Recolecta: Qamets Hatuf (o breve)' },
        { type: 'breve', class: 'u', description: 'Recolecta: Qibbuts (u breve)' },
        { type: 'reducida', class: 'a', description: 'Recolecta: Hateph Pathach (a reducida)' },
        { type: 'reducida', class: 'e', description: 'Recolecta: Hateph Seghol (e reducida)' },
        { type: 'reducida', class: 'o', description: 'Recolecta: Hateph Qamets (o reducida)' },
        { type: 'matres', class: 'all', description: 'Recolecta: Matres Lectionis' }
      ];

      let currentMission = missions[0];

      // Variables para intervalos
      let gameInterval;
      let spawnInterval;
      let moveInterval;

      // Funciones de control táctil (globales)
      window.handleTouchStart = function(direction) {
        if (!gameActive) return;
        if (direction === 'left') moveLeftActive = true;
        if (direction === 'right') moveRightActive = true;
      };

      window.handleTouchEnd = function(direction) {
        if (direction === 'left') moveLeftActive = false;
        if (direction === 'right') moveRightActive = false;
      };

      window.handleJump = function() {
        if (!gameActive || jumping) return;
        jumping = true;
        jumpHeight = 0;
        
        // Animación de salto
        const jumpInterval = setInterval(() => {
          if (!gameActive || !jumping) {
            clearInterval(jumpInterval);
            return;
          }
          
          jumpHeight += 3;
          if (jumpHeight > 30) {
            jumping = false;
            soldierBottom = 40;
          } else {
            soldierBottom = 40 + Math.sin(jumpHeight / 8) * 15;
          }
          soldier.style.bottom = soldierBottom + '%';
        }, 30);
      };

      window.handleShoot = function() {
        if (!gameActive) return;
        
        const bullet = document.createElement('div');
        bullet.className = 'bullet';
        bullet.style.left = (soldierPosition + 4) + '%';
        bullet.style.bottom = (soldierBottom + 10) + '%';
        battlefield.appendChild(bullet);
        
        let bulletX = soldierPosition + 4;
        const bulletInterval = setInterval(() => {
          bulletX += 1.5;
          bullet.style.left = bulletX + '%';
          
          // Detectar colisiones
          document.querySelectorAll('.enemy').forEach(enemy => {
            const enemyLeft = parseFloat(enemy.style.left);
            if (Math.abs(enemyLeft - bulletX) < 3) {
              enemy.remove();
              clearInterval(bulletInterval);
              bullet.remove();
              score += 5;
              scoreValue.textContent = score;
            }
          });
          
          if (bulletX > 100) {
            clearInterval(bulletInterval);
            bullet.remove();
          }
        }, 30);
      };

      function moveSoldier() {
        if (!gameActive) return;
        
        if (moveLeftActive && soldierPosition > 5) {
          soldierPosition -= 1.5;
        }
        if (moveRightActive && soldierPosition < 85) {
          soldierPosition += 1.5;
        }
        
        soldier.style.left = soldierPosition + '%';
      }

      function spawnElement() {
        if (!gameActive) return;
        
        const type = Math.random();
        let element;
        
        if (type < 0.5) {
          // Vocal correcta
          let correctVowels = vowels.filter(v => 
            v.type === currentMission.type && 
            (currentMission.class === 'all' || v.class === currentMission.class)
          );
          
          if (correctVowels.length === 0) {
            correctVowels = vowels.filter(v => v.type === currentMission.type);
          }
          
          if (correctVowels.length > 0) {
            const vowel = correctVowels[Math.floor(Math.random() * correctVowels.length)];
            element = createCollectible(vowel, true);
          }
        } else if (type < 0.8) {
          // Vocal incorrecta
          const incorrectVowels = vowels.filter(v => 
            !(v.type === currentMission.type && 
              (currentMission.class === 'all' || v.class === currentMission.class))
          );
          const vowel = incorrectVowels[Math.floor(Math.random() * incorrectVowels.length)];
          element = createCollectible(vowel, false);
        } else {
          // Enemigo
          element = createEnemy();
        }
        
        if (element) {
          battlefield.appendChild(element);
        }
      }

      function createCollectible(vowel, isCorrect) {
        const div = document.createElement('div');
        div.className = `collectible ${isCorrect ? 'correct' : 'incorrect'}`;
        div.style.left = '100%';
        div.style.bottom = (25 + Math.random() * 45) + '%';
        div.innerHTML = vowel.symbol;
        div.dataset.value = vowel.value || 10;
        div.dataset.isCorrect = isCorrect;
        
        let posX = 100;
        const moveInterval = setInterval(() => {
          if (!gameActive) {
            clearInterval(moveInterval);
            div.remove();
            return;
          }
          
          posX -= 0.6;
          div.style.left = posX + '%';
          
          // Colisión con soldado
          if (Math.abs(posX - soldierPosition) < 4 && 
              Math.abs(parseFloat(div.style.bottom) - soldierBottom) < 15) {
            
            if (isCorrect) {
              score += parseInt(div.dataset.value);
              scoreValue.textContent = score;
              advanceMission();
            } else {
              health -= 10;
              updateHealth();
              if (health <= 0) gameOver();
            }
            
            div.remove();
            clearInterval(moveInterval);
          }
          
          if (posX < -10) {
            div.remove();
            clearInterval(moveInterval);
          }
        }, 40);
        
        return div;
      }

      function createEnemy() {
        const div = document.createElement('div');
        div.className = 'enemy';
        div.style.left = '100%';
        div.style.bottom = (25 + Math.random() * 40) + '%';
        
        let posX = 100;
        const moveInterval = setInterval(() => {
          if (!gameActive) {
            clearInterval(moveInterval);
            div.remove();
            return;
          }
          
          posX -= 0.8;
          div.style.left = posX + '%';
          
          if (Math.abs(posX - soldierPosition) < 5 && 
              Math.abs(parseFloat(div.style.bottom) - soldierBottom) < 20) {
            health -= 20;
            updateHealth();
            div.remove();
            clearInterval(moveInterval);
            if (health <= 0) gameOver();
          }
          
          if (posX < -10) {
            div.remove();
            clearInterval(moveInterval);
          }
        }, 40);
        
        return div;
      }

      function updateHealth() {
        healthFill.style.width = Math.max(0, health) + '%';
        if (health <= 0) gameOver();
      }

      function advanceMission() {
        if (currentTargetIndex < missions.length - 1) {
          currentTargetIndex++;
          currentMission = missions[currentTargetIndex];
          objectiveText.textContent = currentMission.description;
          
          if (currentTargetIndex % 3 === 0) {
            shield += 50;
            shieldValue.textContent = shield;
          }
        } else {
          victory();
        }
      }

      function gameOver() {
        gameActive = false;
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        finalScore.textContent = score;
        gameOverModal.style.display = 'flex';
      }

      function victory() {
        gameActive = false;
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        victoryScore.textContent = score;
        victoryModal.style.display = 'flex';
      }

      function startGame() {
        gameInterval = setInterval(() => {
          moveSoldier();
        }, 30);
        
        spawnInterval = setInterval(() => {
          spawnElement();
        }, 1000);
      }

      // Iniciar juego
      startGame();
      objectiveText.textContent = currentMission.description;
    })();
  </script>
</body>
</html>
