<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana - Curso de Hebreo Bíblico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto+Slab:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos adicionales para el contenido de la semana */
        .week-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .section-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .section-title {
            color: var(--primary);
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .resource-card {
            background: var(--light);
            border-radius: var(--radius);
            padding: 20px;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        
        .resource-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: var(--shadow-lg);
        }
        
        .resource-icon-large {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--primary);
        }
        
        .btn-resource {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-sm);
            margin-top: 15px;
            transition: var(--transition);
        }
        
        .btn-resource:hover {
            background: var(--accent);
            transform: scale(1.05);
        }
        
        .hebrew-text {
            font-size: 2rem;
            direction: rtl;
            font-family: 'Times New Roman', serif;
        }
        
        .vocab-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .vocab-table th {
            background: var(--primary);
            color: white;
            padding: 12px;
        }
        
        .vocab-table td {
            padding: 10px;
            border-bottom: 1px solid var(--gray-light);
        }
        
        .vocab-table tr:hover {
            background: rgba(114, 47, 55, 0.05);
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="weekContent">
            <!-- El contenido se cargará dinámicamente -->
            <div class="text-center" style="padding: 60px;">
                <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary);"></i>
                <p style="margin-top: 20px;">Cargando contenido de la semana...</p>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo">
                <img src="mas logos.jpeg" alt="Ministerio Vivos para Servir" class="logo-small">
                <span>Ministerio "Vivos para Servir"</span>
            </div>
            <div class="footer-info">
                <p>Curso de Hebreo Bíblico © 2026</p>
                <p class="footer-contact">
                    <i class="fas fa-envelope"></i> vivosparaservir@gmail.com | 
                    <i class="fas fa-phone"></i> +53 58169444
                </p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="semana.js"></script>
</body>
</html>
