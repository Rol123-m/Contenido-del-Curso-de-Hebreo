<html lang="es">
<head>

    <title>Hebreo Bíblico · Flashcards Interactivas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #2c3e50 0%, #1a2634 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .app-container {
            max-width: 950px;
            width: 100%;
            background: #f8f4e9;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            border: 1px solid #d4b68a;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        header h1 {
            font-size: 2.5rem;
            color: #3e2c1a;
            font-weight: 600;
            text-shadow: 2px 2px 0 #d4b68a;
        }
        header h1 span {
            font-weight: 300;
            font-size: 1.8rem;
            color: #6b4f2b;
        }
        .sub {
            color: #5a4a34;
            font-style: italic;
            font-size: 1.1rem;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            background: #e8dccc;
            padding: 1rem 1.8rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            border: 1px solid #b99e7c;
        }
        .week-selector {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .week-btn {
            background: #fffbf5;
            border: 1px solid #8b7356;
            color: #3e2e1d;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #8b7356;
        }
        .week-btn.active {
            background: #5f4b34;
            border-color: #3f2f1e;
            color: white;
            box-shadow: 0 4px 0 #2f2317;
            transform: translateY(2px);
        }
        .week-btn:hover {
            background: #dacdbc;
        }
        .progress-indicator {
            background: #3b2b1a;
            color: #f0e3d0;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
        }
        
        /* Estilos para el efecto FLIP CARD */
        .card-container {
            perspective: 1500px;
            margin: 2rem auto;
            width: 100%;
            max-width: 700px;
            height: 380px;
            cursor: pointer;
        }
        
        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 40px;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
        }
        
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 40px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fefcf8;
            border: 3px solid #c9ad84;
            box-shadow: inset 0 -5px 15px rgba(180, 140, 80, 0.2);
        }
        
        .card-front {
            background: linear-gradient(145deg, #ffffff, #f7f0e4);
        }
        
        .card-back {
            background: linear-gradient(145deg, #f7f0e4, #efe3d2);
            transform: rotateY(180deg);
        }
        
        .hebrew-word {
            font-size: 5rem;
            font-weight: 500;
            direction: rtl;
            font-family: 'Times New Roman', 'SBL Hebrew', 'Ezra SIL', 'Cardo', serif;
            color: #1e3a4d;
            text-shadow: 3px 3px 0 rgba(180, 140, 100, 0.2);
            margin-bottom: 0.5rem;
        }
        
        .transliteration {
            font-size: 1.8rem;
            font-weight: 400;
            color: #6f523b;
            background: #f3ede3;
            padding: 0.3rem 2rem;
            border-radius: 60px;
            display: inline-block;
            letter-spacing: 0.5px;
        }
        
        .meaning {
            font-size: 2.8rem;
            font-weight: 600;
            color: #2d3f2d;
            margin-bottom: 1rem;
        }
        
        .frequency {
            font-size: 1.4rem;
            background: #d9cfbc;
            padding: 0.5rem 1.8rem;
            border-radius: 30px;
            color: #2f2a1f;
            font-weight: 500;
            border: 1px dashed #8f765a;
        }
        
        .info-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        
        .audio-btn {
            background: #ffffff;
            border: 3px solid #8d765b;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-size: 2.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #6b5b4a;
            color: #2c3e2c;
        }
        .audio-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6b5b4a;
        }
        .audio-btn:hover {
            background: #ede0d1;
        }
        
        .flip-hint {
            font-size: 1rem;
            color: #5e5a4f;
            margin-top: 0.8rem;
            font-style: italic;
        }
        
        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin: 2rem 0 1rem;
        }
        .nav-btn {
            background: #fff1e0;
            border: none;
            font-size: 2.2rem;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 8px 0 #8f7961;
            cursor: pointer;
            transition: 0.1s;
            font-weight: bold;
            color: #3a2c1c;
            border: 1px solid #bbaa95;
        }
        .nav-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #6b5a48;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 5px 0 #aaa08f;
            pointer-events: none;
        }
        .card-counter {
            font-size: 1.4rem;
            background: #f1e7da;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            font-weight: 600;
        }
        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            color: #5f4d35;
            font-size: 1rem;
            font-weight: 500;
        }
    </style>
</head>

    // ==================== ESTADO DE LA APP ====================
    let currentWeek = 'week4';
    let currentIndex = 0;
    let words = vocabData[currentWeek];
    let isFlipped = false;  // control del flip

    // Elementos DOM
    const weekBtns = document.querySelectorAll('.week-btn');
    const flashcard = document.getElementById('flashcard');
    const cardContainer = document.getElementById('cardContainer');
    const hebrewEl = document.getElementById('hebrewWord');
    const translitEl = document.getElementById('translit');
    const meaningEl = document.getElementById('meaning');
    const freqEl = document.getElementById('frequency');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const cardCounter = document.getElementById('cardCounter');
    const progressText = document.getElementById('progressText');
    const audioBtn = document.getElementById('audioBtn');

    // ==================== FUNCIONES ====================
    function updateCard() {
        // Actualizar contenido
        const word = words[currentIndex];
        hebrewEl.textContent = word.hebrew;
        translitEl.textContent = `(${word.translit})`;
        meaningEl.textContent = word.meaning;
        freqEl.textContent = `Frec. ${word.freq}`;
        
        // Actualizar contadores
        cardCounter.textContent = `${currentIndex + 1} / ${words.length}`;
        progressText.textContent = `${currentIndex + 1}/${words.length}`;
        
        // Resetear el flip a la cara frontal (hebreo) al cambiar de palabra
        if (isFlipped) {
            flashcard.classList.remove('flipped');
            isFlipped = false;
        }
    }

    // Función de síntesis de voz
    function speakHebrew(text) {
        if (!window.speechSynthesis) {
            alert("Tu navegador no soporta síntesis de voz.");
            return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'he-IL';
        utterance.rate = 0.8;
        utterance.pitch = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    // ==================== EVENTOS ====================
    
    // Voltear tarjeta al hacer clic en el contenedor
    cardContainer.addEventListener('click', (e) => {
        // Evitar que el clic en el botón de audio también voltee
        if (e.target === audioBtn || audioBtn.contains(e.target)) {
            return;
        }
        flashcard.classList.toggle('flipped');
        isFlipped = !isFlipped;
    });

    // Botón de audio (no voltea la tarjeta)
    audioBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        speakHebrew(words[currentIndex].hebrew);
    });

    // Navegación
    prevBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    });

    nextBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentIndex < words.length - 1) {
            currentIndex++;
            updateCard();
        }
    });

    // Cambio de semana
    weekBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const week = e.target.dataset.week;
            if (!week) return;
            
            // Actualizar botones
            weekBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            
            // Cambiar datos
            currentWeek = week;
            words = vocabData[currentWeek];
            currentIndex = 0;
            updateCard();
        });
    });

    // Teclado: flechas izquierda/derecha
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevBtn.click();
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextBtn.click();
        }
    });

    // Inicializar
    updateCard();
</script>
